# FPS Competitive (CS2, Valorant, Arena shooters)
# Priority: input latency < smoothness < visual quality
# Target: 360Hz display, 25–35W TDP

[profile]
tdp_watts    = 35.0
dt           = 0.002778   # 1/360 — Z dynamics tick at display rate
lambda       = 0.14       # faster decay → tighter state tracking
alpha        = 0.10       # stronger backreaction → norm stable under flick shots
e_target     = 1.0
ema_beta     = 0.88       # fast S_k tracking → GhostGuard more responsive
frame_gen    = "interpolate"
vrs_enabled  = true

[tuning]
ghost_threshold     = 0.03   # tight — catch prediction errors before they affect aim
collapse_threshold  = 0.01
rebirth_scale       = 0.5

[spectral_io]
divergence_threshold  = 0.22  # high — flick shots are intentional fast motion, not transitions
salience_threshold    = 0.35  # conservative prefetch — FPS maps are small, load fast
prefetch_ttl_frames   = 8

[render_budget]
resolution_floor      = 0.75   # never below 0.75 — aliasing breaks target identification
skip_frames_allowed   = false  # never skip frames in competitive
afmf2_multiplier      = 2      # 2× max — latency budget constraint

[notes]
rationale = "360Hz dt ticks Z dynamics at display refresh. Lower ema_beta (0.88 vs 0.93) means S_k tracks Z_k faster, so GhostGuard detects prediction errors within 2-3 frames instead of 5-6. Resolution never drops below 0.75 — pixel-perfect aim requires clean anti-aliasing."
